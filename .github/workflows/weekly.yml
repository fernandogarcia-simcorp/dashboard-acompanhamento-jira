name: Dashboard (refresh diário + e-mail segunda)

on:
  schedule:
    # Diário 08:30 America/Sao_Paulo == 11:30 UTC (atualiza o relatório todo dia)
    - cron: "30 11 * * *"
  workflow_dispatch:
    inputs:
      force_email:
        description: "Enviar e-mail mesmo fora de segunda (teste)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determinar dia da semana (1 = segunda, UTC)
        id: dow
        run: |
          if [ "$(date -u +%u)" = "1" ]; then echo "is_monday=yes" >> "$GITHUB_OUTPUT"; else echo "is_monday=no" >> "$GITHUB_OUTPUT"; fi

      - name: Atualizar dados (Jira + Tempo) e regenerar dashboard
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          TEMPO_TOKEN: ${{ secrets.TEMPO_TOKEN }}
        run: python refresh_all.py

      - name: Commitar dashboard atualizado (dispara deploy do Amplify)
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html dashboard.html
          if git diff --cached --quiet; then
            echo "Sem mudancas no dashboard."
          else
            git commit -m "chore: refresh diario do dashboard [skip ci]"
            git push
          fi

      # E-mail apenas na segunda-feira (resumo da semana ANTERIOR), ou disparo manual forcado
      - name: Enviar e-mail semanal (segunda / manual)
        if: ${{ steps.dow.outputs.is_monday == 'yes' || github.event.inputs.force_email == 'true' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python send_email.py --previous-week
